name: Mestiço
type: ascendancy
img: systems/animus/assets/system-icons/ascendancies/mestico.svg
system:
  description: >-
    Você é o resultado de gerações de encontros entre diferentes raças.
    Essa herança fluida lhe confere uma versatilidade natural, permitindo
    adaptar-se a diversas situações e aprender com diferentes tradições.
    Fisicamente, você pode apresentar traços mistos, dificultando a identificação
    de sua linhagem pura, o que muitas vezes o torna um estranho em ambos os
    mundos.
  bonus:
    value: 1
    attributes:
      - pot
      - hab
      - cog
      - per
      - pre
    
    selectedAttribute: ''
  innateAbilities:
    - name: Versatilidade Genética
      description: >-
        Descendentes de múltiplas linhagens. Mais adaptáveis — pagando o preço de não ter uma identidade racial única.
      mechanicalEffect: >-
        Escolha 1 habilidade maior de qualquer Ascendência (armas naturais, Voo, etc.) e 2 habilidades de perícia de qualquer Ascendência.
    - name: Herança Composta
      description: >-
        Ao atingir o nível 3, aprende uma 4ª habilidade (menor) de qualquer ascendência. Ao nível 6, aprende uma 5ª habilidade.
      mechanicalEffect: >-
        Progressão de habilidades adicional nos níveis 3 e 6.
    - name: Convergência
      description: >-
        1x por arco narrativo: active o modo Convergência por 1 cena.
      mechanicalEffect: >-
        Durante a cena, você tem acesso a todas as habilidades passivas de uma Ascendência completa escolhida. Ao fim da cena, fica Exausto por 1 hora.

