  innateAbilities:
    - name: Versatilidade Genética
      description: Descendente de múltiplas linhagens.
      mechanicalEffect: >-
        Escolha 1 habilidade maior e 2 habilidades de perícia de outras
        Ascendências.
    - name: Herança Composta
      description: Evolução constante das habilidades raciais.
      mechanicalEffect: Aprende uma 4ª habilidade no Nível 3 e uma 5ª habilidade no Nível 6.
    - name: Convergência
      description: Acesso temporário ao poder total de uma linhagem.
      mechanicalEffect: >-
        1x por arco: ativa todas as passivas de uma Ascendência por 1 cena; Fica
        Exausto por 1h após o uso.
