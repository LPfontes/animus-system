_id: 7b220d58044ee882
name: Roedor
type: ascendancy
img: systems/animus/assets/system-icons/ascendancies/roedor.svg
system:
  description: >-
    Você descende de uma raça roedora, com características semelhantes a ratos,
    esquilos ou hamsters. Comumente ágeis e adaptáveis, os Roedores valorizam a
    curiosidade e a engenhosidade. Fisicamente, os Roedores são cobertos por pelos,
    que variam em cor de acordo com a sub-raça. Eles possuem presas que podem ser
    utilizadas em combate e um instinto de sobrevivência aguçado.
  bonus:
    value: 1
    attributes:
      - hab
      - cog
    
    selectedAttribute: ''
  innateAbilities:
    - name: Presas
      description: >-
        Dentes naturais que podem ser usados em combate.
      mechanicalEffect: >-
        Você pode realizar uma mordida (custa 1 Ponto de Ação). Use as estatísticas de uma arma perfurante média.
    - name: Sorrateiro
      description: >-
        Você sabe ser silencioso em quase todas as situações.
      mechanicalEffect: >-
        +1d em testes de Furtividade.
    - name: Socialidade Inata
      description: >-
        Você tem a capacidade natural de lidar com situações sociais.
      mechanicalEffect: >-
        +1d em testes de Persuasão.
    - name: Fuga Evasiva
      description: >-
        Quando recebe dano, você pode se deslocar um quadrado (1,5m) em uma direção segura.
      mechanicalEffect: >-
        Reação ao receber dano: mova-se 1,5m em direção segura.
    - name: Mãos Leves
      description: >-
        Você sabe mover suas mãos de forma furtiva e imperceptível.
      mechanicalEffect: >-
        +1d em testes de Prestidigitação.

