_id: 7b220d58044ee882
name: Roedor
type: ascendancy
img: systems/animus/assets/system-icons/ascendancies/roedor.svg
system:
  description: >-
    Você descende de uma raça roedora, com características semelhantes a ratos,
    esquilos ou hamsters. Comumente ágeis e adaptáveis, os Roedores valorizam a
    curiosidade e a engenhosidade. Fisicamente, os Roedores são cobertos por pelos,
    que variam em cor de acordo com a sub-raça. Eles possuem presas que podem ser
    utilizadas em combate e um instinto de sobrevivência aguçado.
  bonus:
    value: 1
    attributes:
      - hab
      - cog
    selectedAttribute: ''
  innateAbilities:
    - name: Presas
      description: Dentes naturais usados em combate.
      mechanicalEffect: >-
        Ataque com 2 <span class="text-mechanic">PA</span>; use estatísticas de
        arma perfurante média.
    - name: Sorrateiro
      description: Silencioso por natureza.
      mechanicalEffect: <span class="text-mechanic">Vantagem</span> em testes de Furtividade
    - name: Fuga Evasiva
      description: >-
        Capacidade de se deslocar rapidamente ao sofrer <span
        class="text-mechanic">dano</span>.
      mechanicalEffect: >-
        <span class="text-mechanic">Reação</span>: mova-se 1,5m em direção
        segura ao receber <span class="text-mechanic">dano</span>.
    - name: Mãos Leves
      description: Movimentos manuais imperceptíveis.
      mechanicalEffect: <span class="text-mechanic">Vantagem</span> em testes de Prestidigitação
effects: []
