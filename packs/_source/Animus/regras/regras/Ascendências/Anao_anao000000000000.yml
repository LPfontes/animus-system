    Você descende de uma raça anã, orgulhosa de sua herança e de suas tradições. 
    Comumente fortes e resistentes, os Anões valorizam a perseverança e a honra. 
    Fisicamente, os Anões são robustos e musculosos, com pele que varia em cor de acordo com a sub-raça. 
    Eles possuem uma grande afinidade com a terra e com os minerais, e são conhecidos por sua habilidade em forjar armas e armaduras.
