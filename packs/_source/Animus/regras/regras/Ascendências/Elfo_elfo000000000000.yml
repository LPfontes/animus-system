name: Elfo
type: ascendancy
img: systems/animus/assets/system-icons/ascendancies/elfo.png
system:
  description: >-
    Você descende da raça élfica, seres de vida longa e profunda conexão com a Anima e o conhecimento ancestral. 
    Comumente elegantes e reservados, os Elfos valorizam a sabedoria, a arte e a harmonia com o mundo natural. 
    Fisicamente, possuem traços finos e orelhas pontiagudas, movendo-se com uma leveza sobrenatural que reflete sua agilidade e precisão.
  bonus:
    value: 1
    attributes:
      - hab
      - per
    
    selectedAttribute: ''
  innateAbilities:
    - name: Sentidos Élficos
      description: >-
        Olhos adaptados à penumbra das florestas antigas e ouvido afiado por séculos de caça e vigília.
      mechanicalEffect: >-
        Enxergue em escuridão parcial sem penalidade. +1d em testes de Percepção.
    - name: Foco Ancestral
      description: >-
        Tradição milenar de arco e flecha refina a mira além do que outras linhagens conseguem treinar.
      mechanicalEffect: >-
        +1d em testes de Pontaria.
    - name: Memória das Eras
      description: >-
        Longevidade natural permite aos elfos acumular conhecimento sobre eras esquecidas, criaturas raras e história antiga.
      mechanicalEffect: >-
        +1d em testes de Conhecimento Arcano.

