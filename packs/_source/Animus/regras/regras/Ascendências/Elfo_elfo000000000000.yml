  innateAbilities:
    - name: Memória Genética
      description: Uma conexão profunda com as experiências de seus ancestrais.
      mechanicalEffect: +1d em testes de Conhecimento (Compreensão)
    - name: Distanciamento Emocional
      description: Uma natureza reservada que dificulta a expressão de sentimentos.
      mechanicalEffect: -1d em testes de Persuasão
    - name: Passos Leves
      description: Movimentação silenciosa e graciosa em qualquer terreno.
      mechanicalEffect: +1d em testes de Furtividade ou Acrobacia
    - name: Conexão Especial
      description: O povo élfico mantém uma rede de contatos e reconhecimento místico.
      mechanicalEffect: 1x por sessão: declarar a existência de outro elfo na região, pode ser um conhecido entretanto seu status atua fica cargo do mestre.
