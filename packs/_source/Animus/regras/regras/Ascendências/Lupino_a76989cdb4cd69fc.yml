name: Lupino
type: ascendancy
img: systems/animus/assets/system-icons/ascendancies/lupino.svg
system:
  description: >-
    Você descende de uma raça lupina, com características semelhantes a lobos,
    coiotes ou chacais. Comumente territoriais e protetores, os Lupinos valorizam
    lealdade e família.
    Fisicamente, os Lupinos são cobertos por pelos, que variam em cor de acordo com a sub-raça. Eles possuem presas que
    podem ser utilizadas em combate, e um faro apurado que os permite rastrear presas mesmo a grandes distâncias.
  bonus:
    value: 1
    attributes:
      - pot
      - pre
    selectedAttribute: ''
  innateAbilities:
    - name: Presas
      description: Dentes naturais. <br>Use estatísticas de arma cortante média.
      mechanicalEffect: Ataque com 2 <span class="text-mechanic">PA</span>.
    - name: Faro
      description: Detecta nuances que outros não conseguem.
      mechanicalEffect: +1d em testes de sentidos e percepção
    - name: Rosnado
      description: Causa calafrios em outros seres.
      mechanicalEffect: +1d em testes de Intimidação
