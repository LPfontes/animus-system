_id: a76989cdb4cd69fc
name: Lupino
type: ascendancy
img: systems/animus/assets/system-icons/ascendancies/lupino.svg
system:
  description: >-
    Você descende de uma raça lupina, com características semelhantes a lobos,
    coiotes ou chacais. Comumente territoriais e protetores, os Lupinos valorizam
    lealdade e família.
    Fisicamente, os Lupinos são cobertos por pelos, que variam em cor de acordo com a sub-raça. Eles possuem presas que
    podem ser utilizadas em combate, e um faro apurado que os permite rastrear presas mesmo a grandes distâncias.
  bonus:
    value: 1
    attributes:
      - pot
      - pre
    
    selectedAttribute: ''
  innateAbilities:
    - name: Presas
      description: >-
        Dentes naturais que podem ser usados em combate.
      mechanicalEffect: >-
        Você pode realizar uma mordida (custa 1 Ponto de Ação). Use as estatísticas de uma arma de corte média.
    - name: Faro
      description: >-
        Seu faro é afiado e detecta nuances que outros não conseguiriam.
      mechanicalEffect: >-
        Ganha +1d em testes de sentidos e percepção.
    - name: Socialidade Inata
      description: >-
        Você tem a capacidade natural de lidar com situações sociais.
      mechanicalEffect: >-
        +1d em testes de Persuasão.
    - name: Rosnado
      description: >-
        Seu rosnado causa calafrios em outros seres, sendo um claro sinal de agressão.
      mechanicalEffect: >-
        +1d em testes de Intimidação.

