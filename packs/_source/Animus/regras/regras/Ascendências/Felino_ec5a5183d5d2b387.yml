_id: ec5a5183d5d2b387
name: Felino
type: ascendancy
img: systems/animus/assets/system-icons/ascendancies/felino.svg
system:
  description: >-
    Você descende de uma raça felina, com características semelhantes a gatos, tigres, leões ou pânteras.
    Comumente ágeis e furtivos, os Felinos valorizam a sagacidade e astúcia.
    Fisicamente, os Felinos são cobertos por pelos, que variam em cor de acordo com a sub-raça. Eles possuem garras que
    podem ser retraídas. Comumente com rotinas noturnas, são predadores excepcionais.
  bonus:
    value: 1
    attributes:
      - hab
      - per
    
    selectedAttribute: ''
  innateAbilities:
    - name: Garras
      description: >-
        Lâminas naturais de queratina que surgem instantaneamente para combate, mantendo-se ocultas para manipulação precisa de objetos.
      mechanicalEffect: >-
        Você pode atacar com uma garra (custa 1 Ponto de Ação) ou com as duas garras (custa 3 Pontos de Ação). Use as estatísticas de uma arma cortante leve.
    - name: Reação Rápida
      description: >-
        Mesmo quando estiver distraído, você consegue reagir.
      mechanicalEffect: >-
        Você não pode ser surpreendido por ataques que consiga ouvir ou ver (exceto se morrer ou ficar inconsciente). Ataques surpresa contra você têm Desvantagem em vez de Vantagem automática.
    - name: Visão Noturna
      description: >-
        Pupilas verticais que se dilatam para captar luz mínima, revelando detalhes em completa escuridão.
      mechanicalEffect: >-
        Enxergue perfeitamente na escuridão sem penalidades.
    - name: Furtividade Felina
      description: >-
        Seus movimentos são instintivamente silenciosos e bem calculados.
      mechanicalEffect: >-
        +1d em testes de furtividade.

