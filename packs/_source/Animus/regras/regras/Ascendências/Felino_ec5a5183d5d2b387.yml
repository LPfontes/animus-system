_id: ec5a5183d5d2b387
name: Felino
type: ascendancy
img: systems/animus/assets/system-icons/ascendancies/felino.svg
system:
  description: >-
    Você descende de uma raça felina, com características semelhantes a gatos, tigres, leões ou pânteras.
    Comumente ágeis e furtivos, os Felinos valorizam a sagacidade e astúcia.
    Fisicamente, os Felinos são cobertos por pelos, que variam em cor de acordo com a sub-raça. Eles possuem garras que
    podem ser retraídas. Comumente com rotinas noturnas, são predadores excepcionais.
  bonus:
    value: 1
    attributes:
      - hab
      - pre
    selectedAttribute: ''
  innateAbilities:
    - name: Garras
      description: >-
        Lâminas naturais de queratina. <br>Use estatísticas de arma cortante
        leve.
      mechanicalEffect: >-
        Permite ataque com 1 <span class="text-mechanic">PA</span> (uma garra)
        ou 3 <span class="text-mechanic">PA</span> (duas garras).
    - name: Reação Rápida
      description: >-
        Ataques surpresa contra você têm <span
        class="text-mechanic">Desvantagem</span> em vez de <span
        class="text-mechanic">Vantagem</span>.
      mechanicalEffect: >-
        Trasforma <span class="text-mechanic">vantagem</span> em <span
        class="text-mechanic">desvantagem</span> em ataques surpresa
    - name: Visão Noturna
      description: Enxerga perfeitamente na escuridão sem penalidades.
      mechanicalEffect: Ignorar penalidade escuridão
    - name: Furtividade Felina
      description: Movimentos instintivamente silenciosos.
      mechanicalEffect: +1d em testes de Furtividade
effects: []
