_id: 18d0e3d426e4cdf3
name: Reptilia
type: ascendancy
img: systems/animus/assets/system-icons/ascendancies/reptilia.svg
system:
  description: >-
    Você descende de uma raça reptiliana, com características semelhantes a lagartos, crocodilos ou cobras.
    Comumente frios e calculistas, os Reptilia valorizam a sobrevivência e o conhecimento. Fisicamente, os Reptilia
    possuem escamas que variam em cor e textura de acordo com a sub-raça. Eles possuem presas que podem ser utilizadas em
    combate, e um olfato aguçado que os permite rastrear presas mesmo a grandes distâncias.
  bonus:
    value: 1
    attributes:
      - pot
      - per
    
    selectedAttribute: ''
  innateAbilities:
    - name: Presas
      description: >-
        Dentes naturais que podem ser usados em combate.
      mechanicalEffect: >-
        Você pode realizar uma mordida (custa 1 Ponto de Ação). Use as estatísticas de uma arma perfurante média.
    - name: Ataque Venenoso
      description: >-
        Quando usa suas presas pode inocular veneno em seu oponente. Você possui 2 cargas de veneno preparado por sessão.
      mechanicalEffect: >-
        CD de resistência: 7+POT do atacante. Escolha: Mortal (POT+metade do nível de dano por rodada durante 3 rodadas); Debilitante (desvantagem em testes físicos); Atordoante (desvantagem em testes mentais).
    - name: Sorrateiro
      description: >-
        Você sabe ser silencioso em quase todas as situações.
      mechanicalEffect: >-
        +1d em testes de furtividade.
    - name: Dissimulação
      description: >-
        Você consegue fingir com naturalidade.
      mechanicalEffect: >-
        +1d em testes de enganação.
    - name: Letargia do Sangue Frio
      description: >-
        Em ambientes de baixa temperatura, suas reações ficam lentas.
      mechanicalEffect: >-
        Perde 1 ação por turno em ambientes frios.

