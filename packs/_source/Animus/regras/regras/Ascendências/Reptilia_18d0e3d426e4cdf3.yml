system:
  description: >-
    Você descende de uma raça reptiliana, com características semelhantes a lagartos, crocodilos ou cobras.
    Comumente frios e calculistas, os Reptilia valorizam a sobrevivência e o conhecimento. Fisicamente, os Reptilia
    possuem escamas que variam em cor e textura de acordo com a sub-raça. Eles possuem presas que podem ser utilizadas em
    combate, e um olfato aguçado que os permite rastrear presas mesmo a grandes distâncias.
