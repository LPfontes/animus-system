_id: 770dd95e78fda54e
name: Falko
type: ascendancy
img: systems/animus/assets/system-icons/ascendancies/falko.svg
system:
  description: >-
    Você descende de uma raça alada, com características semelhantes a aves de
    rapina. Comumente orgulhosos e altivos, os Falko valorizam a liberdade e a
    honra de seus compromissos acima de tudo. São conhecidos por sua visão
    aguçada, garras afiadas e ossos ocos, que os tornam mais leves e rápidos,
    mas também mais frágeis a impactos.
  bonus:
    value: 1
    attributes:
      - hab
      - pre
    
    selectedAttribute: ''
  innateAbilities:
    - name: Voo
      description: >-
        Possui asas que permitem voar enquanto não usa armaduras médias ou pesadas.
      mechanicalEffect: >-
        Para decolar: gaste 1 Ponto de Ação e desloque-se com o dobro da velocidade normal. Limite de Voo sustentado: HAB rodadas por cena sem descanso. Após o limite, cada rodada adicional custa 1 Ponto de Ação extra de esforço.
    - name: Visão Afiada
      description: >-
        Olhos projetados para ver a longas distâncias com grandes detalhes.
      mechanicalEffect: >-
        +1d em testes de percepção.
    - name: Ossos Ocos
      description: >-
        Os ossos dos Falkos são ocos e leves — essenciais para o Voo, conferindo agilidade aérea natural.
      mechanicalEffect: >-
        Você amortece quedas (dano reduzido à metade), realiza saltos assistidos (dobra a distância) e pode planar de plataformas elevadas.

