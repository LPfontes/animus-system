system:
  description: >-
    Você descende da raça humana, a mais versátil e numerosa de Animus. 
    Capazes de se adaptar a qualquer ambiente e sociedade, os humanos são conhecidos por sua engenhosidade, 
    capacidade de construção e habilidades sociais. 
    Sua história é marcada pela exploração e pela criação de grandes civilizações, sempre buscando novas formas de evoluir e prosperar.
  bonus:
    value: 1
    attributes:
      - pot
      - hab
      - cog
      - per
      - pre
    
    selectedAttribute: ''
  innateAbilities:
    - name: Adaptabilidade
      description: >-
        Sem traços herdados marcantes, o humano compensa com versatilidade. Aprende rápido e se ajusta a qualquer situação.
      mechanicalEffect: >-
        Receba +1 perícia adicional no nível 1 (5 perícias iniciais Amador em vez de 4).
    - name: Socialidade Inata
      description: >-
        Vocação social — humanos formam vínculos com facilidade e dialogam com quase qualquer interlocutor.
      mechanicalEffect: >-
        +1d em testes de Persuasão.
    - name: Resiliência Comum
      description: >-
        Corpo treinável, fôlego longo, tolerância a privações. O humano resiste onde criaturas mais especializadas falham.
      mechanicalEffect: >-
        +1d em testes de Resistência.

