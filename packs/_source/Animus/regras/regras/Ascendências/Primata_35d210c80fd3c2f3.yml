system:
  description: >-
    Você descende de uma raça primata, com características semelhantes a
    chimpanzés, gorilas ou orangotangos. Comumente fortes e ágeis, os Primatas
    valorizam a força física e a capacidade de adaptação. Fisicamente, os Primatas
    possuem grande força muscular e são capazes de se mover com agilidade tanto
    em terra quanto em árvores. 
