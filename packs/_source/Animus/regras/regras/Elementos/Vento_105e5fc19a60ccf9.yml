  philosophy: |-
    <p><b>Vento: O Moldador do Campo</b></p> <ul>
      <li><b>Dano de corte:</b> +ANI ao dano do efeito quando o vento se torna lâmina.</li>
      <li><b>Reposicionamento de inimigos:</b> arremessados para fora da área, aterrissam onde os conjuradores escolherem. Dano de colisão pequeno (até +ANI) se a superfície for cortante ou dura.</li>
      <li><b>Reposicionamento de aliados:</b> até 9m sem custo de PA, sem teste.</li>
      <li><b>Alcance dobrado:</b> do ponto de contato dos elementos. Em Triplas, pode triplicar (mantenha coerência narrativa).</li>
      <li><b>Linha entre conjuradores:</b> efeito de área vira linha conectando os dois, atingindo tudo no caminho.</li>
      <li><b>Remover condições:</b> remove condições menores (Cansado, Atordoado, Sangramento) de aliados na área gratuitamente.</li>
      <li><b>Dispersão:</b> limpa obscurecimentos livremente, sem teste.</li>
    </ul>
  innateCharacteristic: >-
    <p><b>Rajada:</b> 3+ acertos empurram o alvo 3m (CD 7+ANI para resistir). 4
    acertos: alvo também Derrubado (CD 9+ANI). <b>Bônus:</b> ao usar qualquer
    ataque de Vento, o conjurador pode se mover 1,5m como ação livre.</p>
