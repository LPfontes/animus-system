    - name: Ilusão de Trilha
      rarity: raro
      description: >-
        <p>1 PA, 3 PE: alvo testa PER CD 13 ou se move na direção errada,
        desperdiçando todo o movimento. Falha por 3+: separa completamente do
        grupo.</p>
      check:
        attribute: per
        difficulty: '13'
      specialActions:
        - Desorientar
      img: systems/animus/assets/system-icons/talents/raro.svg
    - name: Chamado da Mata
      rarity: místico
      description: >-
        <p>2 PA, 0 PE: convoca 1d4 animais silvestres (ND 1) da floresta. Agem
        na próxima rodada. Máximo 2x/combate.</p>
      specialActions:
        - Convocar Animais
      formula: 1d4
      img: systems/animus/assets/system-icons/talents/místico.svg
    - name: Pele de Casca
      rarity: comum
      description: >-
        <p>Em floresta: Vantagem em Furtividade. Quando estático, PER CD 15 para
        detectar visualmente. Absorve 2 de qualquer dano de corte.</p>
      bonuses:
        resistances:
          physical: 2
      img: systems/animus/assets/system-icons/talents/comum.svg
  turnPatterns:
