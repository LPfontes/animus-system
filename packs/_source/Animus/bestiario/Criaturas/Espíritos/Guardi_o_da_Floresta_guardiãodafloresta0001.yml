  ecology: >-
    <p>Um místico protetor da mata antiga. Sua pele é composta por cascas de
    árvores milenares e sua presença pode desorientar até o mais experiente dos
    caçadores.</p>
  weaknesses: >-
    <p><b>Fogo direto:</b> +2 de dano por acerto. <b>Território:</b> fora da
    floresta, perde Rastro Invertido e Pele de Casca.</p>
  loot: >-
    <p><b>Raiz do Guardião da Floresta:</b> Runa de Madeira — Vantagem em
    ataques contra criaturas em ambiente natural. Valor: 100 Đ. <b>Gorro do
    Guardião:</b> Vantagem em Sobrevivência e pedido de passagem segura de
    animais 1×/descanso longo. Valor: 350 Đ.</p>
  narratorNotes: >-
    <p>Nunca ataca diretamente de início. Usa Ilusão de Trilha para separar o
    grupo. <b>Negociação:</b> PRE CD 10 com promessa de não caçar no território
    — o Guardião recua e torna-se um aliado passivo.</p>
