  abilities:
    - name: Rastro Invertido
      rarity: místico
      description: >-
        <p>Não pode ser rastreado por meios convencionais. Rastrear exige COG CD
        14 e 1d4 horas — falha resulta em 1d6 horas perdidos na floresta.</p>
      check:
        attribute: cog
