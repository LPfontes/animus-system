  availableActions: >-
    <p><b>Palavras Proibidas:</b> 2 PA. Ataque mental (18m), 5d6 de dano de
    Anima. Ignora 2 de Proteção.</p>
  ecology: >-
    <p>Diz-se que ela não fala, mas que suas palavras vibram diretamente na
    alma. Aqueles que sobrevivem relatam um silêncio ensurdecedor que revela as
    fraquezas mais ocultas.</p>
  weaknesses: >-
    <p><b>Espelho de Anima:</b> um espelho existe no local — destruí-lo (Dureza
    10, PV 10) cancela Barreira de Essência e Profecia da Derrota. <b>Verdades
    não-ditas:</b> contar uma verdade genuína que ela não conhece a Atordoa por
    1 rodada (PER CD 13 para resistir).</p>
  loot: >-
    <p><b>Cristal de Memória:</b> Runa Mental — arma pode usar PRE como atributo
    de ataque 1×/combate. Valor: 180 Đ. <b>Véu da Oráculo:</b> Armadura leve com
    +1 PER permanente e Vantagem contra ilusões. Valor: 250 Đ.</p>
  narratorNotes: >-
    <p>Nunca ataca corpo a corpo — mantém distância mínima de 9m. Ela deve ser
    jogada como uma presença psicológica que ataca a mente e o destino dos
    jogadores.</p>
