    - name: Mente de Predador
      rarity: comum
      description: >-
        <p>Nunca enganada por ilusões. Lê a Anima dos presentes: sabe HP, PE e a
        maior vulnerabilidade de cada um (Narrador revela 1 segredo por oponente
        por combate).</p>
      img: systems/animus/assets/system-icons/talents/comum.svg
    - name: Domínio Mental
      rarity: místico
      description: >-
        <p>2 PA, 6 PE: alvo testa PRE CD 15 ou fica Dominado por 1 rodada (age
        contra o próprio grupo, 1 ação, sem ataques letais a aliados).</p>
      check:
        attribute: pre
        difficulty: '15'
      specialActions:
        - Dominar
      img: systems/animus/assets/system-icons/talents/místico.svg
    - name: Barreira de Essência
      rarity: raro
      description: >-
        <p>1 PA, 5 PE: escudo que absorve o próximo ataque elemental
        completamente e devolve 2 PE ao atacante.</p>
      specialActions:
        - Escudo Elemental
      img: systems/animus/assets/system-icons/talents/raro.svg
    - name: Profecia da Derrota
      rarity: místico
      description: >-
        <p>1x/combate, 0 PA, 0 PE: declara o "destino" de um personagem. Por 3
        rodadas, todo ataque que falhar causa -1 PA acumulativo (máx. -2). CD
        PRE 14 para resistir.</p>
      check:
        attribute: pre
        difficulty: '14'
      specialActions:
        - Profetizar
      img: systems/animus/assets/system-icons/talents/místico.svg
  turnPatterns:
    - label: Dominação
