    - name: Canto Compulsório
      rarity: místico
      description: >-
        <p>Passiva: todo personagem que entrar no combate (ou se aproximar a 20m
        fora dele) testa PRE CD 14 ou gasta todo seu movimento se aproximando da
        água. Enfeitiçados têm Desvantagem em ataques contra a Sereia.</p>
