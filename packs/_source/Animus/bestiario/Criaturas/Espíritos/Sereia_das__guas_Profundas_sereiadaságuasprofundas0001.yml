  ecology: >-
    <p>Uma entidade aquática mística cuja beleza esconde uma natureza
    predatória. Seu canto vibra na frequência da alma, atraindo os incautos para
    as profundezas.</p>
  weaknesses: >-
    <p><b>Fora d'água:</b> após 3+ rodadas fora da água, perde Domínio Aquático
    e sofre –1d em todos os ataques. <b>Metal:</b> armas e projéteis de metal
    causam +2 de dano por acerto.</p>
  loot: >-
    <p><b>Escama da Sereia:</b> Runa de Encantamento — arma pode usar PRE como
    atributo de dano 1×/combate. Valor: 150 Đ. <b>Lágrima da Sereia:</b> 3 doses
    de antídoto permanente contra qualquer veneno aquático. Valor: 200 Đ.</p>
  narratorNotes: >-
    <p><b>Negociação:</b> aceita oferta de 'companhia' (promessa de retornar ou
    objeto pessoal valioso) em troca de ajuda ou passagem livre. A promessa é um
    gancho narrativo forte — ela virá cobrar o preço.</p>
