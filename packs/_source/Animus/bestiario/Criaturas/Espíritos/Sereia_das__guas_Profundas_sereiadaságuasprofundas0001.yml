        attribute: pre
        difficulty: '14'
      img: systems/animus/assets/system-icons/talents/místico.svg
    - name: Domínio Aquático
      rarity: místico
      description: >-
        <p>Em contato com água: ataques de Elemento Água custam 0 PE e são Nível
        2 automaticamente. Move-se na água sem custo de PA.</p>
      img: systems/animus/assets/system-icons/talents/místico.svg
    - name: Toque do Abismo
      rarity: raro
      description: >-
        <p>2 PA, 5 PE: drena a vontade — alvo testa PRE CD 14 ou fica
        Enfeitiçado por 2 rodadas (não pode atacar a Sereia, apenas se defender
        passivamente).</p>
      check:
        attribute: pre
        difficulty: '14'
      specialActions:
        - Enfeitiçar
      img: systems/animus/assets/system-icons/talents/raro.svg
    - name: Barreira de Maré
      rarity: raro
      description: >-
        <p>Reação, 4 PE: quando atingida, cria parede de água. Atacante testa
        HAB CD 12 ou é empurrado 3m e perde o ataque.</p>
      check:
        attribute: hab
        difficulty: '12'
      specialActions:
        - Empurrar
      img: systems/animus/assets/system-icons/talents/raro.svg
  turnPatterns:
